<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestor de Tareas — Login</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 360px; margin: 80px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin: 12px 0 4px; }
    input { width: 100%; padding: 8px; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 16px; font-size: 1rem; cursor: pointer; }
    .error { color: #c0392b; margin-top: 12px; }
    .hint { color: #777; font-size: 0.85rem; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Gestor de Tareas</h1>
  <form method="post" data-testid="login-form">
    <label for="user">Usuario</label>
    <input id="user" name="user" data-testid="login-user" autocomplete="username">
    <label for="password">Contraseña</label>
    <input id="password" name="password" type="password" data-testid="login-password" autocomplete="current-password">
    <button type="submit" data-testid="login-submit">Ingresar</button>
  </form>
  {% if error %}<p class="error" data-testid="login-error">{{ error }}</p>{% endif %}
  <p class="hint">Demo: usuario <strong>demo</strong> / contraseña <strong>demo</strong></p>
</body>
</html>
